			<!-- Tab Navigation Script -->
			<script>
				// Load content from external HTML files
				function loadTabContent(tabName) {
					var contentElement = document.getElementById(tabName);

					// Only load if content is empty (hasn't been loaded yet)
					if (contentElement.innerHTML.trim() === '' || contentElement.innerHTML.includes('Content loaded from')) {
						fetch('partials/' + tabName + '.html')
							.then(response => response.text())
							.then(html => {
								contentElement.innerHTML = html;
							})
							.catch(error => {
								console.error('Error loading partials/' + tabName + '.html:', error);
								contentElement.innerHTML = '<p>Error loading content.</p>';
							});
					}
				}

				function openTab(evt, tabName) {
					// Hide all tab contents
					var tabContents = document.getElementsByClassName("tab-content");
					for (var i = 0; i < tabContents.length; i++) {
						tabContents[i].classList.remove("active");
					}

					// Remove active class from all buttons
					var tabButtons = document.getElementsByClassName("tab-button");
					for (var i = 0; i < tabButtons.length; i++) {
						tabButtons[i].classList.remove("active");
					}

					// Load content for the selected tab
					loadTabContent(tabName);

					// Show the selected tab and mark button as active
					document.getElementById(tabName).classList.add("active");
					evt.currentTarget.classList.add("active");
				}

				// Load the default tab content on page load
				document.addEventListener('DOMContentLoaded', function() {
					loadTabContent('about');
				});
			</script>
